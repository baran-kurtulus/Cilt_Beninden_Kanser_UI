<div class="result-container">
  <h2 class="section-title">Analiz Sonucu</h2>
  
  <!-- State: No Image Uploaded -->
  <div class="empty-state" *ngIf="!hasResult">
    <div class="empty-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
    </div>
    <p>Analiz sonuçlarını görmek için lütfen bir fotoğraf yükleyin.</p>
  </div>

  <!-- State: Analysis Result -->
  <div class="result-content" *ngIf="hasResult">
    <div class="risk-badge" [ngClass]="riskLevel">
      {{ riskLevelText }} Risk
    </div>

    <div class="confidence-meter">
      <div class="meter-label">
        <span>Güven Aralığı</span>
        <span>%{{ confidence }}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="confidence" [ngClass]="riskLevel"></div>
      </div>
    </div>

    <div class="details-card">
      <h3>Detaylı Bilgiler</h3>
      <ul class="details-list">
        <li><strong>Sınıflandırma:</strong> {{ classification }}</li>
        <li><strong>Simetri Analizi:</strong> {{ symmetry }}</li>
        <li><strong>Kenar Analizi:</strong> {{ borderAnalysis }}</li>
      </ul>
    </div>

    <div class="recommendation-box" [ngClass]="riskLevel">
      <div class="rec-header">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        <strong>Öneri:</strong>
      </div>
      <p>{{ recommendation }}</p>
    </div>
  </div>
</div>
